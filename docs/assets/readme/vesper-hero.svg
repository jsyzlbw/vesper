<svg width="1440" height="780" viewBox="0 0 1440 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vesper product preview</title>
  <desc id="desc">A premium preview of Vesper showing natural language chat, editable reminder cards, calendar timeline, journal, and health insights.</desc>
  <defs>
    <linearGradient id="bg" x1="100" y1="40" x2="1320" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.5" stop-color="#EEF6FF"/>
      <stop offset="1" stop-color="#F9F4E8"/>
    </linearGradient>
    <linearGradient id="orbA" x1="190" y1="120" x2="690" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#78AFFF" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#F2D28B" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="orbB" x1="880" y1="90" x2="1280" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#365CF5" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F7C873" stop-opacity="0.46"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2B8CFF"/>
      <stop offset="1" stop-color="#3465F4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="35" flood-color="#1B3667" flood-opacity="0.16"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
  </defs>

  <rect width="1440" height="780" rx="44" fill="url(#bg)"/>
  <circle cx="310" cy="260" r="230" fill="url(#orbA)" filter="url(#soft)"/>
  <circle cx="1120" cy="360" r="260" fill="url(#orbB)" filter="url(#soft)"/>

  <g transform="translate(84 76)">
    <rect x="0" y="0" width="522" height="628" rx="52" fill="#0F172A" filter="url(#shadow)"/>
    <rect x="16" y="16" width="490" height="596" rx="42" fill="#FFFFFF"/>
    <rect x="176" y="34" width="170" height="28" rx="14" fill="#0F172A"/>
    <text x="58" y="104" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="800">Vesper</text>
    <text x="58" y="138" fill="#6B7280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">自然语言私人助理</text>

    <rect x="58" y="182" width="360" height="74" rx="25" fill="#EFF2F7"/>
    <text x="86" y="215" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="600">明天帮我安排学习、健身</text>
    <text x="86" y="241" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="600">记得留出吃饭时间</text>

    <rect x="124" y="290" width="326" height="62" rx="24" fill="url(#blue)"/>
    <text x="154" y="329" fill="#FFFFFF" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" font-weight="700">拆成独立事项并排序</text>

    <g transform="translate(58 386)">
      <rect width="386" height="146" rx="28" fill="#F8FAFC" stroke="#D7E7FF"/>
      <circle cx="42" cy="44" r="22" fill="#DCEBFF"/>
      <path d="M42 29v17l12 7" stroke="#2B8CFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="78" y="40" fill="#2B8CFF" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="800">AI 建议创建提醒</text>
      <text x="78" y="74" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="800">深度学习</text>
      <text x="78" y="106" fill="#6B7280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">08:30 - 11:30 · 通知 · 可编辑</text>
    </g>
  </g>

  <g transform="translate(664 106)" filter="url(#shadow)">
    <rect width="330" height="238" rx="34" fill="#FFFFFF"/>
    <text x="30" y="52" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800">Timeline</text>
    <text x="30" y="82" fill="#6B7280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">calendar-like day view</text>
    <line x1="64" y1="118" x2="64" y2="198" stroke="#C7DBFF" stroke-width="4" stroke-linecap="round"/>
    <circle cx="64" cy="122" r="12" fill="#2B8CFF"/>
    <circle cx="64" cy="164" r="12" fill="#F2C15D"/>
    <circle cx="64" cy="202" r="12" fill="#22C55E"/>
    <text x="92" y="128" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17" font-weight="700">08:30 Study</text>
    <text x="92" y="170" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17" font-weight="700">12:00 Lunch</text>
    <text x="92" y="208" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17" font-weight="700">17:00 Gym</text>
  </g>

  <g transform="translate(1028 106)" filter="url(#shadow)">
    <rect width="328" height="238" rx="34" fill="#0F172A"/>
    <text x="30" y="54" fill="#FFFFFF" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800">Private Core</text>
    <text x="30" y="88" fill="#B8C5D8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">local-first, user-confirmed</text>
    <rect x="30" y="122" width="118" height="38" rx="19" fill="#1F2D4A"/>
    <text x="55" y="147" fill="#DCEBFF" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">Keychain</text>
    <rect x="166" y="122" width="132" height="38" rx="19" fill="#1F2D4A"/>
    <text x="188" y="147" fill="#DCEBFF" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">SwiftData</text>
    <rect x="30" y="174" width="268" height="38" rx="19" fill="#1F2D4A"/>
    <text x="56" y="199" fill="#DCEBFF" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">OpenAI · Claude · Gemini · Custom</text>
  </g>

  <g transform="translate(664 392)" filter="url(#shadow)">
    <rect width="692" height="238" rx="34" fill="#FFFFFF"/>
    <text x="34" y="56" fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="25" font-weight="900">Journal &amp; Health</text>
    <text x="34" y="88" fill="#6B7280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">morning brief, evening reflection, weekly advice</text>
    <rect x="34" y="122" width="188" height="70" rx="24" fill="#F1F7FF"/>
    <text x="58" y="154" fill="#2B8CFF" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="27" font-weight="900">15,304</text>
    <text x="58" y="178" fill="#667085" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14">steps synced</text>
    <rect x="252" y="122" width="188" height="70" rx="24" fill="#FFF7E6"/>
    <text x="276" y="154" fill="#C78310" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="27" font-weight="900">7.2 h</text>
    <text x="276" y="178" fill="#667085" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14">sleep context</text>
    <rect x="470" y="122" width="188" height="70" rx="24" fill="#EFFDF5"/>
    <text x="494" y="154" fill="#16A34A" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="27" font-weight="900">AI</text>
    <text x="494" y="178" fill="#667085" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14">weekly suggestions</text>
  </g>

  <text x="84" y="734" fill="#64748B" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Vesper turns intention into editable, auditable actions.</text>
</svg>
